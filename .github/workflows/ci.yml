name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint: static analysis and formatting checks
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest

      - name: Check formatting (gofumpt)
        run: |
          UNFORMATTED=$(gofumpt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: ./cmd/... ./internal/...

  # ---------------------------------------------------------------------------
  # Test: unit + integration tests with a real PostgreSQL instance
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: oad
          POSTGRES_PASSWORD: oad
          POSTGRES_DB: oad
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oad -d oad"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgresql://oad:oad@localhost:5432/oad?sslmode=disable

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out

  # ---------------------------------------------------------------------------
  # Build: verify the binary compiles successfully
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: go build -ldflags="-w -s" -o bin/oad ./cmd/oad

  # ---------------------------------------------------------------------------
  # Security: SAST (gosec) + filesystem vulnerability scan (trivy)
  #
  # Both scanners upload SARIF results to GitHub Security tab for review.
  # Findings are reported as annotations but do not block the pipeline —
  # security issues are triaged separately from build/test health.
  # Required permission: security-events: write (SARIF upload API).
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gosec — Go SAST scan
        id: gosec
        uses: securego/gosec@master
        # continue-on-error: findings produce a non-zero exit code by design.
        # We surface them via SARIF in the Security tab rather than blocking CI.
        continue-on-error: true
        with:
          args: -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: trivy — filesystem vulnerability scan
        id: trivy
        # if: always() ensures trivy runs even when the gosec step above reports
        # findings (exit code != 0 before continue-on-error is applied to status).
        if: always()
        uses: aquasecurity/trivy-action@master
        # continue-on-error: same rationale as gosec — findings are reported via
        # SARIF, not as a pipeline gate. Raise exit-code to "1" to gate on
        # CRITICAL/HIGH once the baseline is established.
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "0"
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy.sarif

      - name: Upload trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

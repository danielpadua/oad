# Maintains a single open "Release PR" against main, computed from
# Conventional Commits since the last release. Merging that PR creates the
# vX.Y.Z tag, which triggers .github/workflows/release.yml (GoReleaser).
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

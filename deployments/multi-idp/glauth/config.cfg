# glauth LDAP server — static directory for the OAD full-stack dev environment.
# Provides per-user group membership so Dex can emit a real `groups` claim.
# Mounted read-only into the glauth container at /etc/glauth/config.cfg.

[ldap]
  enabled = true
  listen = "0.0.0.0:3893"

[ldaps]
  enabled = false

[backend]
  datastore = "config"
  baseDN = "dc=oad,dc=dev"
  nameformat = "cn"
  groupformat = "ou"

# Service account — used by Dex to bind and search the directory.
[[users]]
  name = "svc"
  unencryptedPassword = "svcpassword"
  primarygroup = 6000
  uidnumber = 1000
  [[users.capabilities]]
    action = "search"
    object = "*"

# OAD users — each mapped to a group that becomes the `groups` claim in tokens.
[[users]]
  name = "admin"
  mail = "admin@oad.dev"
  unencryptedPassword = "admin"
  primarygroup = 5000
  uidnumber = 1001

[[users]]
  name = "editor"
  mail = "editor@oad.dev"
  unencryptedPassword = "editor"
  primarygroup = 5001
  uidnumber = 1002

[[users]]
  name = "viewer"
  mail = "viewer@oad.dev"
  unencryptedPassword = "viewer"
  primarygroup = 5002
  uidnumber = 1003

[[users]]
  name = "pdp"
  mail = "pdp@oad.dev"
  unencryptedPassword = "pdp"
  primarygroup = 5002
  uidnumber = 1004

# Groups — gidnumber ties users to groups via primarygroup above.
[[groups]]
  name = "admin"
  gidnumber = 5000

[[groups]]
  name = "editor"
  gidnumber = 5001

[[groups]]
  name = "viewer"
  gidnumber = 5002

[[groups]]
  name = "svcaccts"
  gidnumber = 6000

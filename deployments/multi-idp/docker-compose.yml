services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080"
    environment:
      OAD_DATABASE: "postgresql://oad:oad@postgres:5432/oad?sslmode=disable"
    volumes:
      - ./config.yml:/etc/oad/config.yml:ro
    command: ["run", "server", "--config", "/etc/oad/config.yml"]
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      dex:
        condition: service_healthy
    restart: on-failure

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak_data:/opt/keycloak/data
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: ["CMD", "bash", "-c", "{ exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/oad/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3; } 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: oad
      POSTGRES_PASSWORD: oad
      POSTGRES_DB: oad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oad -d oad"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  glauth:
    image: glauth/glauth:v2.5.0
    ports:
      - "3893:3893"
    volumes:
      - ./glauth/config.cfg:/app/config/config.cfg:ro
    restart: unless-stopped

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    ports:
      - "5556:5556"
    volumes:
      - ./dex/config.yml:/etc/dex/config.yml:ro
    command: ["dex", "serve", "/etc/dex/config.yml"]
    depends_on:
      glauth:
        # Dex connects to LDAP lazily (on first auth), so service_started is enough.
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5556/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:

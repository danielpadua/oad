services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://oad:oad@postgres:5432/oad?sslmode=disable"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: oad
      POSTGRES_PASSWORD: oad
      POSTGRES_DB: oad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oad -d oad"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:

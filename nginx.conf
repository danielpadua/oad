server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream hostnames are resolved at request
    # time, not at config-load time. Without this, nginx aborts if the 'api'
    # container is not yet registered in the Docker network when nginx starts.
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $api http://api:8080;

    # SPA fallback — all non-asset routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container.
    location /api/ {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy health and metrics endpoints.
    location ~ ^/(health|metrics)$ {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Cache static assets aggressively; HTML must always be revalidated.
    location ~* \.(js|css|woff2?|svg|png|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
